format = """\
    $username\
    $hostname\
    $directory\
    $git_branch\
    $git_commit\
    $git_state\
    $git_status\
    $line_break\
    $cmd_duration\
    $character\
    """

[character]
success_symbol = "[❯](bold green)"
vicmd_symbol = "[❮](bold yellow)"
error_symbol = "[✖](bold red)"

[cmd_duration]
min_time = 0
show_milliseconds = true
format = "[$duration]($style)"

[directory]
truncate_to_repo = false

[git_branch]
format = "[$symbol$branch]($style) "